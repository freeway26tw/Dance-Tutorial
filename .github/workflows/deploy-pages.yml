name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
      - claude/funny-wozniak-q1LfZ
  workflow_dispatch:

# 讓此 workflow 有權限部署到 GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# 同一時間只允許一個部署
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # 整個 repo 根目錄就是網站內容
          path: "."

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
